version: '3.8'
services:
  mongo1:
    image: mongo:8.0
    container_name: mongo1
    command: mongod --replSet rs0 --bind_ip_all --port 27017
    ports:
      - "27017:27017"
    volumes:
      - mongo1_data:/data/db

  mongo2:
    image: mongo:8.0
    container_name: mongo2
    # Each mongod listens on its own unique port so the replica set advertises
    # mongo2:27018 and mongo3:27019 - all reachable from the host via
    # 127.0.0.1:PORT without needing separate loopback IPs.
    command: mongod --replSet rs0 --bind_ip_all --port 27018
    ports:
      - "27018:27018"
    volumes:
      - mongo2_data:/data/db

  mongo3:
    image: mongo:8.0
    container_name: mongo3
    command: mongod --replSet rs0 --bind_ip_all --port 27019
    ports:
      - "27019:27019"
    volumes:
      - mongo3_data:/data/db

  mongo-init:
    image: mongo:8.0
    container_name: mongo-init
    depends_on:
      - mongo1
      - mongo2
      - mongo3
    restart: "no"
    entrypoint: >
      mongosh --host mongo1:27017 --eval '
        rs.initiate({
          _id: "rs0",
          members: [
            { _id: 0, host: "mongo1:27017", priority: 2 },
            { _id: 1, host: "mongo2:27018", priority: 1 },
            { _id: 2, host: "mongo3:27019", priority: 1 }
          ]
        });
      '

volumes:
  mongo1_data:
  mongo2_data:
  mongo3_data:
